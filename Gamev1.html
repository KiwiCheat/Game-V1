<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Có Âm Thanh</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #70c5ce;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            color: white;
            text-shadow: 3px 3px 6px #000;
            pointer-events: none;
            z-index: 10;
        }
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 30px 60px;
            border-radius: 15px;
            text-align: center;
            font-size: 26px;
            z-index: 20;
        }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 20px;
            cursor: pointer;
            background: #ffcc00;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="startScreen">
        <h1>Flappy Bird</h1>
        <p>Nhấn SPACE hoặc Click để bay lên</p>
        <button onclick="startGame()">BẮT ĐẦU CHƠI</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const startScreen = document.getElementById("startScreen");

        // Âm thanh (dùng link công khai miễn phí)
        const sounds = {
            flap: new Audio("https://www.myinstants.com/media/sounds/sfx_wing.mp3"),
            point: new Audio("https://www.myinstants.com/media/sounds/sfx_point.mp3"),
            hit: new Audio("https://www.myinstants.com/media/sounds/sfx_hit.mp3"),
            die: new Audio("https://www.myinstants.com/media/sounds/sfx_die.mp3")
        };

        // Chỉnh volume cho tự nhiên hơn
        sounds.flap.volume = 0.7;
        sounds.point.volume = 0.9;
        sounds.hit.volume = 0.8;
        sounds.die.volume = 0.9;

        let bird, gravity, velocity, pipes, score, gameRunning, frame;

        function resetGame() {
            bird = { x: 80, y: 250, width: 30, height: 25, velocity: 0 };
            gravity = 0.6;
            velocity = 0;
            pipes = [];
            score = 0;
            frame = 0;
            scoreElement.textContent = "0";
            
            pipes.push({ x: 400, top: Math.random() * 180 + 80, passed: false });
        }

        function drawBird() {
            ctx.fillStyle = "#f7d51d";
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            ctx.fillStyle = "#ff8800";
            ctx.fillRect(bird.x + bird.width, bird.y + 8, 12, 10);
            ctx.fillStyle = "#fff";
            ctx.fillRect(bird.x + 20, bird.y + 6, 8, 8);
            ctx.fillStyle = "#000";
            ctx.fillRect(bird.x + 24, bird.y + 8, 4, 4);
        }

        function drawPipes() {
            ctx.fillStyle = "#5cb85c";
            for (let pipe of pipes) {
                ctx.fillRect(pipe.x, 0, 60, pipe.top);
                ctx.fillRect(pipe.x - 5, pipe.top - 30, 70, 30);
                
                const bottomY = pipe.top + 180;
                ctx.fillRect(pipe.x, bottomY, 60, canvas.height - bottomY);
                ctx.fillRect(pipe.x - 5, bottomY, 70, 30);
            }
        }

        function update() {
            if (!gameRunning) return;

            bird.velocity += gravity;
            bird.y += bird.velocity;

            frame++;
            if (frame % 85 === 0) {
                const top = Math.random() * 180 + 80;
                pipes.push({ x: 450, top: top, passed: false });
            }

            for (let i = 0; i < pipes.length; i++) {
                const p = pipes[i];
                p.x -= 2;

                if (!p.passed && p.x + 60 < bird.x) {
                    p.passed = true;
                    score++;
                    scoreElement.textContent = score;
                    sounds.point.currentTime = 0;
                    sounds.point.play();
                }

                if (p.x < -70) {
                    pipes.splice(i, 1);
                    i--;
                }
            }

            // Va chạm
            let collided = false;
            if (bird.y < 0 || bird.y + bird.height > canvas.height - 40) {
                collided = true;
            }

            for (let pipe of pipes) {
                if (
                    bird.x + bird.width > pipe.x && bird.x < pipe.x + 60 &&
                    (bird.y < pipe.top || bird.y + bird.height > pipe.top + 180)
                ) {
                    collided = true;
                }
            }

            if (collided) {
                sounds.hit.currentTime = 0;
                sounds.hit.play();
                setTimeout(() => {
                    sounds.die.currentTime = 0;
                    sounds.die.play();
                }, 100);
                gameOver();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ded895";
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

            update();
            drawPipes();
            drawBird();

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            setTimeout(() => {
                alert("Game Over! Điểm của bạn: " + score + "\nNhấn OK để chơi lại.");
                startScreen.style.display = "block";
            }, 300);
        }

        function startGame() {
            startScreen.style.display = "none";
            resetGame();
            gameRunning = true;
        }

        function flap() {
            if (gameRunning) {
                bird.velocity = -12;
                sounds.flap.currentTime = 0;
                sounds.flap.play();
            }
        }

        // Điều khiển
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                flap();
            }
        });

        canvas.addEventListener("click", flap);
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            flap();
        });

        // Khởi động game
        gameLoop();
    </script>
</body>
</html>
